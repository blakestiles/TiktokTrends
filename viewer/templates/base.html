<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TikTok Trend Tracker</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; background: #0f0f0f; color: #f0f0f0; }
        nav { background: #1a1a1a; padding: 1rem 2rem; display: flex; align-items: center; gap: 2rem; border-bottom: 1px solid #333; }
        nav h1 { font-size: 1.2rem; color: #ff2d55; }
        nav a { color: #ccc; text-decoration: none; font-size: 0.9rem; }
        nav a:hover { color: #fff; }
        .container { max-width: 1200px; margin: 0 auto; padding: 1.5rem 2rem; }
        .tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
        .tab-btn { padding: 0.4rem 1rem; border-radius: 20px; border: 1px solid #444; background: #1a1a1a; color: #ccc; cursor: pointer; font-size: 0.85rem; }
        .tab-btn.active { background: #ff2d55; border-color: #ff2d55; color: #fff; }
        .tab-btn:hover { border-color: #ff2d55; color: #fff; }
        table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
        th { text-align: left; padding: 0.6rem 0.8rem; background: #1a1a1a; color: #888; font-weight: 600; border-bottom: 1px solid #333; }
        td { padding: 0.6rem 0.8rem; border-bottom: 1px solid #222; vertical-align: middle; }
        tr:hover td { background: #1a1a1a; }
        .badge { display: inline-block; padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.75rem; font-weight: 600; }
        .badge-EMERGING { background: #2d4a22; color: #7ed957; }
        .badge-ACTIVE { background: #1a3a5c; color: #5bc0f8; }
        .badge-DECLINING { background: #4a2020; color: #f87171; }
        .badge-ARCHIVED { background: #2a2a2a; color: #888; }
        .sparkline-cell { width: 120px; }
        a.trend-link { color: #5bc0f8; text-decoration: none; }
        a.trend-link:hover { text-decoration: underline; }
        .rank-badge { display: inline-block; width: 28px; height: 28px; border-radius: 50%; background: #333; text-align: center; line-height: 28px; font-weight: 700; font-size: 0.8rem; }
        {% block extra_style %}{% endblock %}
    </style>
</head>
<body>
    <nav>
        <h1>TikTok Trend Tracker</h1>
        <a href="/">Dashboard</a>
        <a href="/api/report/latest" target="_blank">Latest Report</a>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <script>
        {% block scripts %}{% endblock %}
    </script>
</body>
</html>
